function computeGrouped() {
  const regions = [];
  const regionIndex = {};
  const prefIndex = {};
  STATIONS.forEach((s, idx) => {
    const pref = s[0], name = s[1], location = s[2], round = s[3];
    const region = REGION_OF[pref] || "その他";
    if (!(region in regionIndex)) {
      regionIndex[region] = regions.length;
      regions.push({ name: region, prefs: [] });
    }
    const r = regions[regionIndex[region]];
    const prefKey = region + "|" + pref;
    if (!(prefKey in prefIndex)) {
      prefIndex[prefKey] = r.prefs.length;
      r.prefs.push({ name: pref, stations: [] });
    }
    r.prefs[prefIndex[prefKey]].stations.push({ idx, name, location, round });

function computeCounts() {
  const perPref = {};

  GROUPED.forEach((region) => {

    region.prefs.forEach((pref) => {
      let pv = 0;
      pref.stations.forEach((st) => {

      const total = pref.stations.length + extras.length;
      const visitedCount = pv + extraVisited;
      perPref[pref.name] = { visited: visitedCount, total: total };

    if (q && !((cst.name && cst.name.includes(q)) || (cst.location && cst.location.includes(q)))) return;
    if (state.onsenOnly && effectiveOnsen(cst.official ? cst.pref : "登録外", cst.name, visits[cst.id]) !== "yes") return;
    out.push({ idx: cst.id, pref: cst.official ? cst.pref : "登録外", name: cst.name, location: cst.location, round: null, isCustom: true });
  });
  return out;
}

function computeCompletedPrefCount(counts) {
  return Object.values(counts.perPref).filter((c) => c.total > 0 && c.visited === c.total).length;
}

function buildBackupPayload() {
  return { version: 2, exportedAt: new Date().toISOString(), visits: visits, customs: customs, customCollectibles: customCollectibles, hiddenCollectibles: hiddenCollectibleKeys };
}

function exportBackup() {
  const json = JSON.stringify(buildBackupPayload(), null, 2);
  const filename = "michinoeki-backup-" + new Date().toISOString().slice(0, 10) + ".json";
  try {
    const file = new File([json], filename, { type: "application/json" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      navigator.share({ files: [file], title: "道の駅手帖バックアップ" }).catch(function () {});
      return;
    }
  } catch (e) {
    /* File/Web Share API unavailable on this browser - fall through to download link */
  }
  try {
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 2000);
    state.backupMessage = "保存を開始しました（できない場合は下のテキストを使ってください）。";
    rerender();
  } catch (e) {
    state.backupOpen = true;
    state.backupMessage = "自動保存に失敗しました。下のテキストを長押しでコピーしてください。";
    rerender();
  }
}

function copyBackup() {
  const json = JSON.stringify(buildBackupPayload(), null, 2);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(json).then(function () {
      state.backupMessage = "コピーしました。メモなどに貼り付けて保存できます。";
      rerender();
    }).catch(function () {
      state.backupOpen = true;
      state.backupMessage = "コピーに失敗しました。下のテキストを長押しでコピーしてください。";
      rerender();
    });
  } else {
    state.backupOpen = true;
    state.backupMessage = "下のテキストを長押しでコピーしてください。";
    rerender();
  }
}

function restoreFromText(text) {
  let data;
  try {
    data = JSON.parse(text);
  } catch (e) {
    state.backupMessage = "読み込みに失敗しました：正しいバックアップ文ではないようです。";
    rerender();
    return;
  }
  if (!data || typeof data.visits !== "object" || data.visits === null || !Array.isArray(data.customs)) {
    state.backupMessage = "読み込みに失敗しました：データの形式が想定と違います。";
    rerender();
    return;
  }
  visits = data.visits;
  customs = data.customs;
  customCollectibles = Array.isArray(data.customCollectibles) ? data.customCollectibles : [];
  hiddenCollectibleKeys = Array.isArray(data.hiddenCollectibles) ? data.hiddenCollectibles : [];
  migrateCustomsIntoVisits();
  persistVisits();
  persistCustoms();
  persistCustomCollectibles();
  persistHiddenCollectibles();
  state.backupMessage = "復元しました（" + Object.keys(visits).length + "件の記録 / " + customs.length + "件の追加駅 / " + customCollectibles.length + "件のカスタム収集物）。";
  state.backupOpen = false;
  rerender();
}

function renderOdometer(value) {
  const digits = digitsOf(value);
  const spans = digits.map(function (d) {
    return '<span class="font-odometer text-2xl sm:text-3xl px-2 py-1 rounded-md" style="background:#0D1117;color:' + COLORS.amber + ';border:1px solid ' + COLORS.hairline2 + ';box-shadow:inset 0 2px 4px rgba(0,0,0,0.6)">' + d + '</span>';
  }).join("");
  return '<div class="flex items-end gap-1">' + spans + '</div>';
}

function renderBar(pct, complete) {
  const safe = isFinite(pct) ? pct : 0;
  return '<div class="h-1.5 w-full rounded-full overflow-hidden" style="background:' + COLORS.hairline + '">' +
    '<div class="h-full rounded-full" style="width:' + Math.min(100, safe) + '%;background:' + (complete ? COLORS.green : COLORS.amber) + ';transition:width 300ms ease"></div>' +

}

      '<div class="rounded-xl p-3 mt-2" style="background:' + COLORS.surfaceAlt + ';border:1px solid ' + COLORS.blue + '">' +
      '<input id="newcollectible-name" placeholder="名前（例：ソフトクリーム）" class="w-full text-sm rounded-lg px-2.5 py-2 mb-2" style="background:#0D1117;border:1px solid ' + COLORS.hairline2 + ';color:' + COLORS.text + '">' +
      '<div class="text-[11px] mb-1.5" style="color:' + COLORS.mutedDeep + '">マーク</div>' +
      '<div class="flex gap-1.5 flex-wrap mb-2">' + iconGrid + textBtn + '</div>' +
      (textSelected ? '<input id="newcollectible-mark-text" maxlength="2" placeholder="絵文字や文字" class="w-24 text-sm rounded-lg px-2.5 py-2 mb-2" style="background:#0D1117;border:1px solid ' + COLORS.hairline2 + ';color:' + COLORS.text + '">' : '') +
      '<div class="flex gap-2 mt-1">' +
      '<button data-action="add-collectible" class="flex-1 text-sm font-medium rounded-lg py-2" style="background:' + COLORS.amber + ';color:' + COLORS.bg + '">追加する</button>' +
      '<button data-action="cancel-collectible-form" class="text-sm rounded-lg py-2 px-4" style="background:' + COLORS.hairline + ';color:' + COLORS.text + '">やめる</button>' +
      '</div>' +
      '</div>';
  } else {
    formHtml = '<button data-action="show-collectible-form" class="w-full flex items-center justify-center gap-1.5 text-xs rounded-lg py-2 mt-2" style="background:' + COLORS.surfaceAlt + ';border:1px dashed ' + COLORS.hairline2 + ';color:' + COLORS.muted + '">' + iconPlus({ size: 13 }) + ' 収集物を追加</button>';
  }

  return (
    '<div class="rounded-2xl p-3.5 mb-5" style="background:' + COLORS.surface + ';border:1px solid ' + COLORS.hairline + '">' +
    '<div class="text-xs font-bold mb-2" style="color:' + COLORS.faint + '">収集物を管理</div>' +
    (listHtml || '<div class="text-[11px]" style="color:' + COLORS.mutedDeep + '">追加した収集物はまだありません</div>') +
    formHtml +
    '</div>'
  );
}

function renderStatsView() {
  const counts = computeCounts();
  const totalVisited = computeTotalVisited();
  const completedPrefCount = computeCompletedPrefCount(counts);
  const collectTotals = computeCollectTotals();

  const prefRanking = Object.entries(counts.perPref)
    .map(function (entry) {
      const name = entry[0], c = entry[1];
      return { name: name, visited: c.visited, total: c.total, pct: c.total ? (c.visited / c.total) * 100 : 0 };
    })
    .sort(function (a, b) {
      return (b.pct - a.pct) || (b.visited - a.visited);
    });

  const summaryHtml =
    '<div class="rounded-2xl p-4 mb-4" style="background:' + COLORS.surface + ';border:1px solid ' + COLORS.hairline + '">' +
    '<div class="grid grid-cols-3 gap-3 text-center">' +
    '<div><div class="text-xl font-display" style="color:' + COLORS.amber + '">' + totalVisited + '</div><div class="text-[11px] mt-1" style="color:' + COLORS.faint + '">到達済み</div></div>' +
    '<div><div class="text-xl font-display" style="color:' + COLORS.text + '">' + (getOfficialTotalCount() - totalVisited) + '</div><div class="text-[11px] mt-1" style="color:' + COLORS.faint + '">未到達</div></div>' +
    '<div><div class="text-xl font-display" style="color:' + COLORS.green + '">' + completedPrefCount + '</div><div class="text-[11px] mt-1" style="color:' + COLORS.faint + '">制覇県</div></div>' +
    '</div>' +
    (customs.length > 0 ? '<div class="text-[11px] text-center mt-3" style="color:' + COLORS.blue + '">＋登録外 ' + customs.length + '件</div>' : '') +
    '</div>';

  const collectRowsHtml = getVisibleCollectibles().map(function (c) {
    const t = collectTotals[c.key];
    return (
      '<div class="mb-2.5 last:mb-0">' +
      '<div class="flex items-center gap-1.5 text-xs mb-1" style="color:' + COLORS.textDim + '">' + c.icon({ size: 12, color: COLORS.mutedDeep }) + ' ' + c.label + '</div>' +
      '<div class="flex gap-4 text-xs">' +
      '<span style="color:' + COLORS.green + '">入手済 ' + t.got + '</span>' +
      '<span style="color:' + COLORS.muted + '">未入手 ' + t.none + '</span>' +
      '<span style="color:' + COLORS.muted + '">存在しない ' + t.na + '</span>' +
      '<span style="color:' + COLORS.blue + '">不明 ' + t.unk + '</span>' +
      '</div>' +
      '</div>'
    );
  }).join("");

  const collectSummaryHtml =
    '<div class="rounded-2xl p-3.5 mb-5" style="background:' + COLORS.surface + ';border:1px solid ' + COLORS.hairline + '">' +
    '<div class="text-xs font-bold mb-3" style="color:' + COLORS.faint + '">収集物（サブ記録）</div>' +
    collectRowsHtml +
    '</div>';

  const collectManagementHtml = renderCollectibleManagement();

  const regionBarsHtml = REGION_ORDER.map(function (r) {
    const c = counts.perRegion[r] || { visited: 0, total: 0 };
    const pct = c.total ? (c.visited / c.total) * 100 : 0;
    const complete = c.total > 0 && c.visited === c.total;
    return (
      '<div class="mb-3">' +
      '<div class="flex justify-between text-xs mb-1"><span style="color:' + COLORS.textDim + '">' + r + '</span><span style="color:' + COLORS.faint + '">' + c.visited + '/' + c.total + '</span></div>' +
      renderBar(pct, complete) +
      '</div>'
    );
  }).join("");

  const rankingHtml = prefRanking.map(function (p, i) {
    return (
      '<div class="flex items-center gap-3 px-3 py-2.5" style="border-bottom:' + (i < prefRanking.length - 1 ? "1px solid " + COLORS.hairline : "none") + '">' +
      '<span class="text-xs w-5 text-right flex-shrink-0" style="color:' + COLORS.mutedDeep + '">' + (i + 1) + '</span>' +
      '<span class="text-sm flex-1 min-w-0 truncate" style="color:' + COLORS.text + '">' + escapeHtml(p.name) + '</span>' +
      (p.pct === 100 && p.total > 0 ? '<span class="text-[10px] flex-shrink-0" style="color:' + COLORS.green + '">制覇</span>' : '') +
      '<span class="text-xs tabular-nums flex-shrink-0" style="color:' + COLORS.muted + '">' + p.visited + '/' + p.total + '</span>' +
      '<div class="w-12 flex-shrink-0">' + renderBar(p.pct, p.pct === 100) + '</div>' +
      '</div>'
    );
  }).join("");

  return (
    summaryHtml +
    renderBackupSection() +
    collectSummaryHtml +
    collectManagementHtml +
    '<h2 class="text-sm font-bold mb-2 px-1" style="color:' + COLORS.faint + '">地方別の進み具合</h2>' +
    '<div class="rounded-2xl p-4 mb-5" style="background:' + COLORS.surface + ';border:1px solid ' + COLORS.hairline + '">' + regionBarsHtml + '</div>' +
    '<h2 class="text-sm font-bold mb-2 px-1" style="color:' + COLORS.faint + '">都道府県ランキング</h2>' +
    '<div class="rounded-2xl overflow-hidden" style="background:' + COLORS.surface + ';border:1px solid ' + COLORS.hairline + '">' + rankingHtml + '</div>'
  );
}

function renderApp() {
  const counts = computeCounts();
  const totalVisited = computeTotalVisited();
  const totalOfficial = getOfficialTotalCount();
  const collectTotals = computeCollectTotals();
  const onsenMatchCount = computeOnsenMatchCount();
  const searchResults = computeSearchResults();

  const collectLineHtml = getVisibleCollectibles().map(function (c) {
    return '<span class="flex items-center gap-1">' + c.icon({ size: 11 }) + '<span>' + collectTotals[c.key].got + '</span></span>';
  }).join("");

  const headerHtml =
    '<div class="mb-5">' +
    '<div class="flex items-center justify-between mb-1">' +
    '<h1 class="font-display text-xl" style="color:' + COLORS.text + '">道の駅手帖</h1>' +
    '<span class="text-[10px] tracking-wide flex-shrink-0" style="color:' + COLORS.mutedDeep + '">全国' + totalOfficial + '駅</span>' +
    '</div>' +
    '<div class="rounded-2xl p-4 mt-3" style="background:linear-gradient(180deg, ' + COLORS.surface + ' 0%, ' + COLORS.surfaceAlt + ' 100%);border:1px solid ' + COLORS.hairline + '">' +
    '<div class="flex items-center justify-between">' +
    '<div>' +
    '<div class="text-[11px] tracking-widest mb-1" style="color:' + COLORS.faint + '">到達数</div>' +
    renderOdometer(totalVisited) +
    '</div>' +
    '<div class="text-right">' +
    '<div class="text-2xl font-display" style="color:' + COLORS.amber + '">' + Math.round((totalVisited / totalOfficial) * 100) + '<span class="text-sm">%</span></div>' +
    '<div class="text-[11px] mt-0.5" style="color:' + COLORS.faint + '">残り' + (totalOfficial - totalVisited) + '駅</div>' +
    '</div>' +
    '</div>' +
    '<div class="mt-3">' + renderBar((totalVisited / totalOfficial) * 100, totalVisited === totalOfficial) + '</div>' +
    '<div class="flex items-center gap-3 text-[11px] mt-2" style="color:' + COLORS.mutedDeep + '">' +
    collectLineHtml +
    (customs.length > 0 ? '<span style="color:' + COLORS.blue + '">＋追加 ' + customs.length + '件</span>' : '') +
    '</div>' +
    '</div>' +
    '</div>';

  const tabsHtml =
    '<div class="flex gap-2 mb-4">' +
    '<button data-action="set-view" data-value="list" class="flex-1 text-sm font-medium rounded-xl py-2.5 flex items-center justify-center gap-1.5" style="background:' + (state.view === "list" ? COLORS.amber : COLORS.surface) + ';color:' + (state.view === "list" ? COLORS.bg : COLORS.muted) + ';border:1px solid ' + (state.view === "list" ? COLORS.amber : COLORS.hairline) + '">' + iconList({ size: 15 }) + ' 記録する</button>' +
    '<button data-action="set-view" data-value="stats" class="flex-1 text-sm font-medium rounded-xl py-2.5 flex items-center justify-center gap-1.5" style="background:' + (state.view === "stats" ? COLORS.amber : COLORS.surface) + ';color:' + (state.view === "stats" ? COLORS.bg : COLORS.muted) + ';border:1px solid ' + (state.view === "stats" ? COLORS.amber : COLORS.hairline) + '">' + iconBarChart3({ size: 15 }) + ' 統計</button>' +
    '</div>';

  let bodyHtml = "";

  if (state.view === "list") {
    const searchBarHtml =
      '<div class="relative mb-4">' +
      iconSearch({ size: 16, color: COLORS.mutedDeep, cls: "absolute left-3 top-1/2 -translate-y-1/2" }) +
      (state.query ? '<button data-action="clear-search" class="absolute right-3 top-1/2 -translate-y-1/2">' + iconX({ size: 16, color: COLORS.mutedDeep }) + '</button>' : '') +
      '<input id="search-input" value="' + escapeHtml(state.query) + '" placeholder="駅名・地名で検索" class="w-full text-sm rounded-xl pl-9 pr-9 py-3" style="background:' + COLORS.surface + ';border:1px solid ' + COLORS.hairline + ';color:' + COLORS.text + '">' +
      '</div>' +
      '<button data-action="toggle-onsen-filter" class="flex items-center gap-1.5 text-xs rounded-full px-3 py-1.5 mb-1" style="background:' + (state.onsenOnly ? COLORS.onsen + "26" : COLORS.surface) + ';border:1px solid ' + (state.onsenOnly ? COLORS.onsen : COLORS.hairline) + ';color:' + (state.onsenOnly ? COLORS.onsen : COLORS.textDim) + '">' +
      '<span style="font-size:13px;line-height:1">♨</span> 温泉のみ表示 <span style="color:' + (state.onsenOnly ? COLORS.onsen : COLORS.mutedDeep) + '">（' + onsenMatchCount + '件）</span>' +
      '</button>' +
      '<div class="text-[10px] mb-4" style="color:' + COLORS.mutedDeep + '">※♨情報は駅名や下調べに基づく推定を含みます。現地・公式サイトでの確認をおすすめします</div>';

    if (searchResults) {
      let listInner;
      if (searchResults.length === 0) {
        listInner = '<div class="text-sm text-center py-10" style="color:' + COLORS.mutedDeep + '">見つかりませんでした。別のキーワードを試してください。</div>';
      } else {
        const rows = searchResults.map(function (s) {
          return (
            '<div>' +
            '<div class="text-[11px] pt-2" style="color:' + COLORS.blue + '">' + escapeHtml(s.pref) + '</div>' +
            renderStationRow(s.idx, s.pref, s.name, s.location, s.round, visits[String(s.idx)], s.isCustom) +
            '</div>'
          );
        }).join("");
        listInner = '<div class="rounded-xl overflow-hidden px-2" style="background:' + COLORS.surface + ';border:1px solid ' + COLORS.hairline + '">' + rows + '</div>';
      }
      bodyHtml = searchBarHtml +
        '<div><div class="text-xs mb-2" style="color:' + COLORS.faint + '">' + searchResults.length + '件見つかりました</div>' + listInner + '</div>';
    } else {
      const regionChipsHtml = '<div class="flex gap-2 overflow-x-auto pb-1 mb-4">' +
        REGION_ORDER.map(function (r) {
          const c = counts.perRegion[r] || { visited: 0, total: 0 };
          return '<button data-action="scroll-region" data-region="' + escapeHtml(r) + '" class="flex-shrink-0 text-xs rounded-full px-3 py-1.5 whitespace-nowrap" style="background:' + COLORS.surface + ';border:1px solid ' + COLORS.hairline + ';color:' + COLORS.textDim + '">' + r + ' <span style="color:' + COLORS.mutedDeep + '">' + c.visited + '/' + c.total + '</span></button>';
        }).join("") +
        '</div>';

      const regionsHtml = GROUPED.map(function (region) {
        const rc = counts.perRegion[region.name] || { visited: 0, total: 0 };
        const rPct = rc.total ? (rc.visited / rc.total) * 100 : 0;
        const rComplete = rc.total > 0 && rc.visited === rc.total;
        const prefsHtml = region.prefs.map(function (pref) {
          const extras = getOfficialCustoms()
            .filter(function (c) { return c.pref === pref.name; })
            .map(function (c) { return { idx: c.id, name: c.name, location: c.location, round: null, isCustom: true }; });
          const combinedStations = pref.stations.map(function (s) {
            return { idx: s.idx, name: s.name, location: s.location, round: s.round, isCustom: false };
          }).concat(extras);
          return renderPrefAccordion(pref.name, combinedStations, counts);
        }).join("");
        return (
          '<div id="region-' + escapeHtml(region.name) + '" class="mb-5">' +
          '<div class="flex items-center gap-2 mb-2 px-1">' +
          '<h2 class="text-sm font-bold flex-shrink-0" style="color:' + COLORS.faint + '">' + region.name + '</h2>' +
          '<div class="flex-1">' + renderBar(rPct, rComplete) + '</div>' +
          '</div>' +
          prefsHtml +
          '</div>'
        );
      }).join("");

      const nonOfficialCustoms = customs.filter(function (c) { return !c.official; });
      const customsHtml =
        '<div class="mt-6">' +
        '<h2 class="text-sm font-bold mb-2 px-1" style="color:' + COLORS.faint + '">登録外の道の駅</h2>' +
        (nonOfficialCustoms.length > 0
          ? '<div class="rounded-xl overflow-hidden px-2 mb-2" style="background:' + COLORS.surface + ';border:1px solid ' + COLORS.hairline + '">' +
            nonOfficialCustoms.map(function (c) { return renderStationRow(c.id, "登録外", c.name, c.location, null, visits[c.id], true); }).join("") +
            '</div>'
          : '') +
        (state.showCustomForm
          ? renderCustomForm()
          : '<button data-action="show-custom-form" class="w-full flex items-center justify-center gap-1.5 text-sm rounded-xl py-3" style="background:' + COLORS.surface + ';border:1px dashed ' + COLORS.hairline2 + ';color:' + COLORS.muted + '">' + iconPlus({ size: 15 }) + ' 駅を追加する</button>') +
        '</div>';

      bodyHtml = searchBarHtml + regionChipsHtml + regionsHtml + customsHtml;
    }
  } else {
    bodyHtml = renderStatsView();
  }

  return '<div class="max-w-xl mx-auto px-4 pt-6 pb-24">' + headerHtml + tabsHtml + bodyHtml + '</div>';
}

const root = document.getElementById("root");

function rerender() {
  const active = document.activeElement;
  const activeId = active && active.id;
  let selStart = null, selEnd = null;
  if (active && typeof active.selectionStart === "number") {
    selStart = active.selectionStart;
    selEnd = active.selectionEnd;
  }
  root.innerHTML = renderApp();
  if (activeId) {
    const el = document.getElementById(activeId);
    if (el) {
      el.focus();
      if (selStart != null && el.setSelectionRange) {
        try { el.setSelectionRange(selStart, selEnd); } catch (e) { /* not a text-selectable input */ }
      }
    }
  }
}

root.addEventListener("click", function (e) {
  const btn = e.target.closest("[data-action]");
  if (!btn) return;
  const action = btn.dataset.action;
  const idx = btn.dataset.idx;

  if (action === "toggle-visited") {
    const cur = visits[idx] || {};
    visits[idx] = Object.assign({}, cur, { v: !cur.v });
    persistVisits();
    rerender();
  } else if (action === "toggle-station") {
    state.openStationId = (String(state.openStationId) === String(idx)) ? null : idx;
    rerender();
  } else if (action === "toggle-pref") {
    const pref = btn.dataset.pref;
    if (state.openPrefs.has(pref)) state.openPrefs.delete(pref);
    else state.openPrefs.add(pref);
    rerender();
  } else if (action === "set-collect") {
    const key = btn.dataset.key;
    const cur = visits[idx] || {};
    const collect = Object.assign({}, cur.collect);
    collect[key] = btn.dataset.value;
    visits[idx] = Object.assign({}, cur, { collect: collect });
    persistVisits();
    rerender();
  } else if (action === "set-onsen") {
    const cur = visits[idx] || {};
    visits[idx] = Object.assign({}, cur, { onsen: btn.dataset.value });
    persistVisits();
    rerender();
  } else if (action === "scroll-region") {
    const el = document.getElementById("region-" + btn.dataset.region);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
  } else if (action === "set-view") {
    state.view = btn.dataset.value;
    rerender();
  } else if (action === "toggle-onsen-filter") {
    state.onsenOnly = !state.onsenOnly;
    rerender();
  } else if (action === "clear-search") {
    state.query = "";
    rerender();
  } else if (action === "show-custom-form") {
    state.showCustomForm = true;
    state.newCustomOfficial = false;
    rerender();
  } else if (action === "cancel-custom-form") {
    state.showCustomForm = false;
    state.newCustomOfficial = false;
    rerender();
  } else if (action === "toggle-custom-official") {
    state.newCustomOfficial = !state.newCustomOfficial;
    rerender();
  } else if (action === "add-custom") {
    const nameEl = document.getElementById("custom-name");
    const name = nameEl.value.trim();
    if (!name) {
      nameEl.focus();
      return;
    }
    const official = !!state.newCustomOfficial;
    let location, pref;
    if (official) {
      const prefEl = document.getElementById("custom-pref");
      pref = prefEl ? prefEl.value : "";
      if (!pref) {
        if (prefEl) prefEl.focus();
        return;
      }
      location = pref;
    } else {
      location = document.getElementById("custom-location").value.trim();
    }
    const id = "c" + Date.now();
    const entry = { id: id, name: name, location: location };
    if (official) {
      entry.official = true;
      entry.pref = pref;
    }
    customs.push(entry);
    visits[id] = { v: true, collect: {}, dates: [], note: "" };
    COLLECTIBLES.forEach(function (col) {
      visits[id].collect[col.key] = "none";
    });
    persistCustoms();
    persistVisits();
    state.showCustomForm = false;
    state.newCustomOfficial = false;
    rerender();
  } else if (action === "delete-custom-station") {
    if (typeof confirm === "function" && !confirm("この駅を削除しますか？記録（チェック・収集物・メモなど）も一緒に消えます。")) {
      return;
    }
    customs = customs.filter(function (c) { return c.id !== idx; });
    delete visits[idx];
    persistCustoms();
    persistVisits();
    if (String(state.openStationId) === String(idx)) state.openStationId = null;
    rerender();
  } else if (action === "add-date") {
    const input = document.getElementById("newdate-" + idx);
    const d = input ? input.value : "";
    if (!d) return;
    const cur = visits[idx] || {};
    let dates = Array.isArray(cur.dates) ? cur.dates.slice() : [];
    dates = dates.filter(function (x) { return x !== d; });
    dates.push(d);
    dates.sort(); // ISO "YYYY-MM-DD" strings sort chronologically as plain strings
    if (dates.length > 3) dates = dates.slice(dates.length - 3); // keep the 3 most recent
    visits[idx] = Object.assign({}, cur, { dates: dates });
    persistVisits();
    rerender();
  } else if (action === "remove-date") {
    const d = btn.dataset.date;
    const cur = visits[idx] || {};
    let dates = Array.isArray(cur.dates) ? cur.dates.slice() : [];
    dates = dates.filter(function (x) { return x !== d; });
    visits[idx] = Object.assign({}, cur, { dates: dates });
    persistVisits();
    rerender();
  } else if (action === "backup-export") {
    exportBackup();
  } else if (action === "backup-copy") {
    copyBackup();
  } else if (action === "backup-toggle") {
    state.backupOpen = !state.backupOpen;
    state.backupMessage = "";
    rerender();
  } else if (action === "backup-restore") {
    const box = document.getElementById("backup-import-box");
    restoreFromText(box ? box.value : "");
  } else if (action === "backup-pick-file") {
    const input = document.getElementById("backup-file-input");
    if (input) input.click();
  } else if (action === "show-collectible-form") {
    state.collectibleFormOpen = true;
    state.newCollectibleMark = { type: "icon", value: "star" };
    rerender();
  } else if (action === "cancel-collectible-form") {
    state.collectibleFormOpen = false;
    rerender();
  } else if (action === "pick-mark-icon") {
    state.newCollectibleMark = { type: "icon", value: btn.dataset.value };
    rerender();
  } else if (action === "pick-mark-text") {
    state.newCollectibleMark = { type: "text", value: "" };
    rerender();
  } else if (action === "add-collectible") {
    const nameEl = document.getElementById("newcollectible-name");
    const name = nameEl ? nameEl.value.trim() : "";
    if (!name) {
      if (nameEl) nameEl.focus();
      return;
    }
    const markState = state.newCollectibleMark || { type: "icon", value: "star" };
    let markValue = markState.value;
    if (markState.type === "text") {
      const markEl = document.getElementById("newcollectible-mark-text");
      markValue = markEl ? markEl.value.trim() : "";
      if (!markValue) markValue = "★";
    }
    customCollectibles.push({
      key: "cc" + Date.now(),
      label: name,
      markType: markState.type,
      markValue: markValue,
      category: APP_CATEGORY,
    });
    persistCustomCollectibles();
    state.collectibleFormOpen = false;
    rerender();
  } else if (action === "toggle-collectible-visible") {
    const key = btn.dataset.key;
    const i = hiddenCollectibleKeys.indexOf(key);
    if (i === -1) hiddenCollectibleKeys.push(key);
    else hiddenCollectibleKeys.splice(i, 1);
    persistHiddenCollectibles();
    rerender();
  } else if (action === "delete-collectible") {
    const key = btn.dataset.key;
    customCollectibles = customCollectibles.filter(function (c) { return c.key !== key; });
    persistCustomCollectibles();
    rerender();
  }
});

root.addEventListener("input", function (e) {
  if (e.target.id === "search-input") {
    state.query = e.target.value;
    rerender();
  }
});

root.addEventListener("change", function (e) {
  if (e.target.id === "backup-file-input" && e.target.files && e.target.files[0]) {
    const reader = new FileReader();
    reader.onload = function () {
      restoreFromText(String(reader.result));
    };
    reader.readAsText(e.target.files[0]);
  }
});

root.addEventListener("focusout", function (e) {
  if (e.target.matches && e.target.matches("textarea[data-note-idx]")) {
    const idx = e.target.dataset.noteIdx;
    const cur = visits[idx] || {};
    visits[idx] = Object.assign({}, cur, { note: e.target.value });
    persistVisits();
  }
});

rerender();

</script>
</body>
</html>
